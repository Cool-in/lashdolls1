<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 55 500 295" width="100%" height="100%">
  <style>
    .logo-text-primary {
      font-family: 'Cormorant Garamond', 'Didot', 'Playfair Display', 'Georgia', serif;
      font-size: 80px;
      font-weight: 400;
      letter-spacing: 0.12em;
      fill: #1c1b19;
      text-anchor: middle;
    }
    .logo-text-secondary {
      font-family: 'Jost', 'Montserrat', 'Helvetica Neue', sans-serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.16em;
      fill: #1c1b19;
      text-anchor: middle;
    }
    .logo-leaf {
      fill: #1c1b19;
    }
  </style>

  <defs>
    <!-- Define a single elegant leaf path -->
    <path id="leaf" class="logo-leaf" d="M 0 0 C -4 -10 -9 -20 0 -30 C 9 -20 4 -10 0 0 Z" />
    
    <!-- Define the 5-leaf cluster motif -->
    <g id="leaf-cluster">
      <!-- Central vertical leaf -->
      <use href="#leaf" />
      <!-- Angled leaves (flanking) -->
      <use href="#leaf" transform="rotate(-35) scale(0.9)" />
      <use href="#leaf" transform="rotate(35) scale(0.9)" />
      <!-- Horizontal/slightly down leaves at base -->
      <use href="#leaf" transform="rotate(-75) scale(0.8) translate(-1, 2)" />
      <use href="#leaf" transform="rotate(75) scale(0.8) translate(1, 2)" />
    </g>
  </defs>

  <!-- Top Leaf Cluster -->
  <use href="#leaf-cluster" x="250" y="90" />

  <!-- Central Brand Name -->
  <text x="250" y="215" class="logo-text-primary notranslate" translate="no">ALMA</text>
  <text x="250" y="255" class="logo-text-secondary notranslate" translate="no">BY ROCIO SANZ</text>

  <!-- Bottom Leaf Cluster (Inverted) -->
  <use href="#leaf-cluster" transform="translate(250, 320) scale(1, -1)" />
</svg>
